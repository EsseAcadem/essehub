<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <title>Essentia Academy 🄷🅄🄱</title>
  <meta name="theme-color" content="#0f6a7a" />
  <style>
    :root{
      --bg:#0f6a7a; --bg2:#0a5561; --text:#f5f8fb;
      --tile-blue:#2d89ef; --tile-green:#00a300; --tile-purple:#7e3878; --tile-orange:#da532c; --tile-pink:#e671b8; --tile-cyan:#00aba9; --tile-yellow:#ffc40d;
      --shadow:0 14px 30px rgba(0,0,0,.25);
      --gap:12px; --unit: clamp(110px, 12vw, 170px);
    }

    *{box-sizing:border-box}
    html,body{ margin:0; color:var(--text); font-family: Calibri, "Segoe UI", -apple-system, system-ui, Roboto, Arial, sans-serif; -webkit-tap-highlight-color: transparent; background: #004050; overflow-x:hidden; }
    body::after{ display:none; }

    .stage{ position:relative; z-index:2; }
    .block{ width: fit-content; margin: 0 auto; padding-bottom: 48px; }

    header{ display:flex; align-items:center; justify-content:flex-start; gap:16px; user-select:none; padding-top: calc(env(safe-area-inset-top, 0px) + clamp(24px, 6vh, 100px)); margin:0 0 clamp(40px, 5vh, 88px); }
    .brand img{ height: clamp(90px, 12vw, 160px); width:auto; display:block }

    /* Split Dashboard Layout */
    .dashboard {
      display: flex;
      flex-wrap: wrap;
      gap: clamp(32px, 4vw, 64px); /* Creates the gap between left and right sections */
      justify-content: center;
      align-items: flex-start;
      margin: 0 auto 24px;
      width: fit-content;
    }

    .grid { 
      display:grid; 
      grid-auto-flow:dense; 
      gap:var(--gap);
      grid-auto-rows: var(--unit);
    }

    /* Left side is wider (6 columns), Right side is narrower (2 columns) */
    .grid.left { grid-template-columns: repeat(6, var(--unit)); }
    .grid.right { grid-template-columns: repeat(2, var(--unit)); }

    /* Responsive adjustments for smaller screens */
    @media (max-width: 1400px){ 
      .grid.left { grid-template-columns: repeat(4, var(--unit)); } 
    }
    @media (max-width: 1050px){  
      .dashboard { flex-direction: column; align-items: center; }
      .grid.right { grid-template-columns: repeat(4, var(--unit)); } 
    }
    @media (max-width: 620px){  
      .grid.left { grid-template-columns: repeat(2, var(--unit)); }
      .grid.right { grid-template-columns: repeat(2, var(--unit)); }
      /* Shrink the large tiles on very small phone screens so they don't break the layout */
      .size-4x1, .size-4x2 { grid-column: span 2; }
    }

    .tile{
      border-radius:18px; padding:10px; display:flex; flex-direction:column; gap:6px;
      color:#fff; text-decoration:none; position:relative; overflow:hidden; outline:none;
      transition: transform .1s ease, box-shadow .2s ease, background .2s ease;
      
      /* Frosty glass base - Blur reduced from 14px to 8px to save huge amounts of GPU memory */
      background: rgba(255,255,255,.08);
      -webkit-backdrop-filter: blur(8px) saturate(120%);
      backdrop-filter: blur(8px) saturate(120%);

      /* Glassy edge + soft depth */
      border: 1px solid rgba(255,255,255,.35);
      box-shadow: var(--shadow), inset 0 1px 0 rgba(255,255,255,.28);
    }
    .tile:focus-visible{ outline:3px solid rgba(255,255,255,.6) }
    .tile:active{ transform: scale(.98) }

    .size-1x1{ grid-column: span 1; grid-row: span 1; min-width: var(--unit); }
    .size-2x1{ grid-column: span 2; grid-row: span 1; }
    .size-2x2{ grid-column: span 2; grid-row: span 2; }
    .size-4x2{ grid-column: span 4; grid-row: span 2; }
    .size-4x1{ grid-column: span 4; grid-row: span 1; }

    .label{ position:absolute; left:12px; bottom:10px; font-weight:400; opacity:.95; font-size:.9rem; margin:0; }
    .icon{ font-size:34px; line-height:1 }

    /* === COLOUR TINTS === */
    .time{
      display:flex; align-items:flex-start; justify-content:space-between;
      background: color-mix(in srgb, var(--tile-purple) 28%, rgba(255,255,255,.08));
      border-color: color-mix(in srgb, var(--tile-purple) 40%, transparent);
    }
    .time:hover{ background: color-mix(in srgb, var(--tile-purple) 34%, rgba(255,255,255,.10)); border-color: color-mix(in srgb, var(--tile-purple) 52%, transparent); }
    .time .clock{ font-size:60px; font-weight:800; letter-spacing:.5px; }
    .time .date{ font-size:16px; opacity:.9; margin-top: 4px; }

    .weather{ background: color-mix(in srgb, var(--tile-blue) 18%, rgba(255,255,255,.08)); border-color: color-mix(in srgb, var(--tile-blue) 40%, transparent); }
    .weather:hover{ background: color-mix(in srgb, var(--tile-blue) 24%, rgba(255,255,255,.10)); border-color: color-mix(in srgb, var(--tile-blue) 52%, transparent); }
    .weather .temp{ font-size:60px; font-weight:800 }
    .weather .cond{ font-size:16px; opacity:.9 }
    .weather .wrow{ display:flex; align-items:center; gap:12px; }
    .weather .wicon{ width: clamp(36px, 8vw, 86px); height:auto; flex:0 0 auto; filter: drop-shadow(0 2px 6px rgba(0,0,0,.25)); }

    .mail{ background: color-mix(in srgb, var(--tile-orange) 40%, rgba(255,255,255,.08)); border-color: color-mix(in srgb, var(--tile-orange) 45%, transparent); }
    .mail:hover{ background: color-mix(in srgb, var(--tile-orange) 44%, rgba(255,255,255,.10)); border-color: color-mix(in srgb, var(--tile-orange) 64%, transparent); }

    .calendar{ background: color-mix(in srgb, var(--tile-green) 18%, rgba(255,255,255,.08)); border-color: color-mix(in srgb, var(--tile-green) 40%, transparent); }
    .calendar:hover{ background: color-mix(in srgb, var(--tile-green) 24%, rgba(255,255,255,.10)); border-color: color-mix(in srgb, var(--tile-green) 52%, transparent); }

    .people{ background: color-mix(in srgb, var(--tile-pink) 28%, rgba(255,255,255,.08)); border-color: color-mix(in srgb, var(--tile-pink) 40%, transparent); }
    .people:hover{ background: color-mix(in srgb, var(--tile-pink) 34%, rgba(255,255,255,.10)); border-color: color-mix(in srgb, var(--tile-pink) 52%, transparent); }

    .links{ background: color-mix(in srgb, var(--tile-blue) 18%, rgba(255,255,255,.08)); border-color: color-mix(in srgb, var(--tile-blue) 40%, transparent); }
    .links:hover{ background: color-mix(in srgb, var(--tile-blue) 24%, rgba(255,255,255,.10)); border-color: color-mix(in srgb, var(--tile-blue) 52%, transparent); }

    .photos{ background: color-mix(in srgb, var(--tile-cyan) 18%, rgba(255,255,255,.08)); border-color: color-mix(in srgb, var(--tile-cyan) 40%, transparent); }
    .photos:hover{ background: color-mix(in srgb, var(--tile-cyan) 24%, rgba(255,255,255,.10)); border-color: color-mix(in srgb, var(--tile-cyan) 52%, transparent); }

    .yellow{ background: color-mix(in srgb, var(--tile-yellow) 30%, rgba(255,255,255,.08)); border-color: color-mix(in srgb, var(--tile-yellow) 40%, transparent); }
    .yellow:hover{ background: color-mix(in srgb, var(--tile-yellow) 36%, rgba(255,255,255,.10)); border-color: color-mix(in srgb, var(--tile-yellow) 52%, transparent); }

    /* --- ICON HOLDER (Responsive & Glassy) --- */
    .imgbox{
      position:absolute; inset:12px 12px 36px 12px; /* room for label */
      display:flex; align-items:center; justify-content:center;
    }
    .tileimg{ 
      display:block; 
      object-fit:contain;
      /* Translucent Glass Effect */
      opacity: 0.5; 
      filter: drop-shadow(0 4px 8px rgba(0,0,0,0.15));
    }
    
    /* Adapt to tile sizes dynamically */
    .size-1x1 .tileimg { width: 55%; height: 55%; }
    .size-2x1 .tileimg { width: auto; height: 70%; max-width: 50%; }
    .size-2x2 .tileimg { width: 55%; height: 55%; }

    /* --- SLIDER TILE --- */
    .slider-tile{ padding:0; } 
    .slider-tile .slider{ position:relative; width:100%; height:100%; overflow:hidden; }
    .slider-tile .slide{ position:absolute; inset:0; opacity:0; transform:translateX(2.5%); transition: opacity 900ms ease, transform 900ms ease; }
    .slider-tile .slide.active{ opacity:1; transform:translateX(0); }
    .slider-tile .slide img{ width:100%; height:100%; object-fit:cover; display:block; filter:brightness(50%); }

    /* Metro entry */
    .dashboard .tile{ opacity:0; transform: translateX(12px) skewX(-4deg) }
    .dashboard.ready .tile{ animation: enter .5s both; }
    /* Both grids will load top-to-bottom at the same time using this delay structure */
    .dashboard.ready .tile:nth-child(1){ animation-delay:.05s } .dashboard.ready .tile:nth-child(2){ animation-delay:.1s }
    .dashboard.ready .tile:nth-child(3){ animation-delay:.15s } .dashboard.ready .tile:nth-child(4){ animation-delay:.2s }
    .dashboard.ready .tile:nth-child(5){ animation-delay:.25s } .dashboard.ready .tile:nth-child(6){ animation-delay:.3s }
    .dashboard.ready .tile:nth-child(7){ animation-delay:.35s } .dashboard.ready .tile:nth-child(8){ animation-delay:.4s }
    .dashboard.ready .tile:nth-child(9){ animation-delay:.45s } .dashboard.ready .tile:nth-child(10){ animation-delay:.5s }
    @keyframes enter{ to{ opacity:1; transform:none } }

    /* === Animated background (Optimised) === */
    .animateme {
      position: fixed; top: 0; left: 0; width: 100%; height: 100%;
      overflow: hidden; z-index: 0; pointer-events:none;
    }
    .bg-bubbles { position: absolute; inset: 0; z-index: 1; margin:0; padding:0; }
    .bg-bubbles li {
      position: absolute; list-style: none; display: block;
      width: 40px; height: 40px; background-color: #353535; bottom: -100px;
      animation: square 25s infinite linear; opacity:0;
      will-change: transform, opacity; /* Tells GPU to handle this for smooth performance */
    }
    .bg-bubbles li:nth-child(1){ left: 10%; width: 80px; height: 80px; border-radius:50%; background:transparent; border:4px solid #353535; }
    .bg-bubbles li:nth-child(2){ left: 25%; width: 120px; height: 120px; animation-delay: 2s; animation-duration: 17s; }
    .bg-bubbles li:nth-child(3){ left: 45%; width: 60px; height: 60px; animation-duration: 22s; }
    .bg-bubbles li:nth-child(4){ left: 65%; width: 100px; height: 100px; animation-delay: 4s; border-radius:50%; background:transparent; border:4px solid #353535; }
    .bg-bubbles li:nth-child(5){ left: 80%; width: 150px; height: 150px; animation-delay: 7s; animation-duration: 35s; background:transparent; border:4px solid #353535; }
    .bg-bubbles li:nth-child(6){ left: 90%; width: 40px; height: 40px; animation-delay: 11s; border-radius:50%; }

    @keyframes square {
      0% { transform: translateY(0); opacity:0; }
      20% { opacity: 0.6; } 
      80% { opacity: 0.6; }
      100% { transform: translateY(-120vh) rotate(600deg); opacity:0; }
    }
  </style>
</head>

  <script>
    const dashboard = document.getElementById('dashboard');
    window.addEventListener('load', ()=> dashboard.classList.add('ready'));

    // Time (London)
    function updateClock(){
      const now = new Date();
      const tz = 'Europe/London';
      const fmtTime = new Intl.DateTimeFormat('en-GB', { hour:'2-digit', minute:'2-digit', hour12:false, timeZone: tz });
      const fmtDate = new Intl.DateTimeFormat('en-GB', { weekday:'long', day:'numeric', month:'long', year:'numeric', timeZone: tz });
      const clockEl = document.getElementById('clock');
      const dateEl  = document.getElementById('date');
      if (clockEl) clockEl.textContent = fmtTime.format(now);
      if (dateEl)  dateEl.textContent  = fmtDate.format(now);
    }
    updateClock();
    setInterval(updateClock, 15000);

    // Weather (London) via Open-Meteo
    async function loadWeather(){
      try{
        const url = 'https://api.open-meteo.com/v1/forecast?latitude=51.5072&longitude=-0.1276&current_weather=true&timezone=Europe%2FLondon';
        const res = await fetch(url, { cache:'no-store' });
        if(!res.ok) throw new Error('HTTP '+res.status);
        const data = await res.json();
        const cw = data.current_weather;
        const codeMap = {0:'Clear',1:'Mainly clear',2:'Partly cloudy',3:'Overcast',45:'Fog',48:'Rime fog',51:'Drizzle',61:'Rain',71:'Snow',80:'Showers',95:'Thunderstorm'};
        document.getElementById('w-temp').textContent = Math.round(cw.temperature) + '°C';
        document.getElementById('w-cond').textContent = codeMap[cw.weathercode] || '';
        const isDay = (cw.is_day === 1);
        
        function iconFor(code){
          if([0,1].includes(code)) return isDay ? 'clear-day' : 'clear-night';
          if(code===2) return isDay ? 'partly-cloudy-day' : 'partly-cloudy-night';
          if(code===3) return isDay ? 'overcast-day' : 'overcast-night';
          if([45,48].includes(code)) return 'fog';
          if([51,53,55].includes(code)) return 'drizzle';
          if([61,63,65,80,81,82].includes(code)) return 'rain';
          if([71,73,75,77,85,86].includes(code)) return 'snow';
          if([95,96,99].includes(code)) return 'thunderstorms';
          return isDay ? 'overcast-day' : 'overcast-night';
        }
        
        const row = document.getElementById('wrow');
        if(row){
          const altText = codeMap[cw.weathercode] || 'Weather';
          let img = document.getElementById('w-icon');
          
          if(!img){ 
              img = document.createElement('img'); 
              img.id='w-icon'; 
              img.className='wicon'; 
              img.alt = altText; 
              row.prepend(img); 
          }
          
          const name = iconFor(cw.weathercode);
          
          const owmCode = {
              'clear-day': '01d', 'clear-night': '01n',
              'partly-cloudy-day': '02d', 'partly-cloudy-night': '02n',
              'overcast-day': '04d', 'overcast-night': '04n',
              'fog': '50d', 'drizzle': '09d', 'rain': '10d', 'snow': '13d', 'thunderstorms': '11d'
          }[name] || '03d';
          
          const sources = [
            `https://cdn.jsdelivr.net/gh/basmilius/weather-icons/design/fill/animation/${name}.svg`,
            `https://cdn.jsdelivr.net/gh/basmilius/weather-icons/production/fill/all/${name}.svg`,
            `https://cdn.jsdelivr.net/gh/marella/meteocons/svg/all/${name}.svg`,
            `https://openweathermap.org/img/wn/${owmCode}@2x.png`
          ];
          
          let currentSrc = 0;
          
          img.onload = () => { img.style.opacity = '1'; };
          img.onerror = () => {
              currentSrc++;
              if (currentSrc < sources.length) {
                  img.src = sources[currentSrc];
              } else {
                  img.style.display = 'none';
              }
          };
          
          img.style.opacity = '0';
          img.style.transition = 'opacity 0.5s ease';
          img.src = sources[0];
        }
      }catch(e){ 
          const condEl = document.getElementById('w-cond');
          if (condEl) condEl.textContent = 'Weather unavailable'; 
      }
    }
    loadWeather();

    // Slider rotation
    (function(){
      const slider = document.getElementById('hubSlider');
      if(!slider) return;
      const slides = slider.querySelectorAll('.slide');
      let i = 0;
      setInterval(() => {
        slides[i].classList.remove('active');
        i = (i + 1) % slides.length;
        slides[i].classList.add('active');
      }, 4000);
    })();
  </script>
</body>
</html>
